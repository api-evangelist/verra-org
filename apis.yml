aid: verra-org
name: Verra
description: >-
  Verra is a Washington, D.C.-based nonprofit standards body that develops
  and manages the world's leading certification programs for climate action
  and sustainable development. Its flagship program, the Verified Carbon
  Standard (VCS), is the most widely used voluntary greenhouse gas crediting
  program globally, with more than 2,579 registered projects across 132+
  countries and over 1.3 billion Verified Carbon Units (VCUs) issued. Verra
  also operates the Climate, Community & Biodiversity Standards (CCB), the
  Sustainable Development Verified Impact Standard (SD VISta), the
  Plastic Waste Reduction Standard (PWRP), the Scope 3 Standard Program,
  and the Jurisdictional and Nested REDD+ (JNR) framework. The Verra
  Registry at registry.verra.org is the system of record for projects,
  methodologies, issuances, retirements, and the AFOLU pooled buffer
  account across these programs; project documentation, public comment
  periods, and credit-lifecycle records are all surfaced through that
  registry. Verra recently launched VCS Version 5, modernizing program
  operations, strengthening safeguards, and clarifying credit rights.
  Verra does not publish a public developer API, OpenAPI specification,
  SDK, or GitHub organization; programmatic data access is limited to the
  registry's web interface and filtered report exports, and there is no
  open-source code or machine-readable spec catalog associated with the
  organization.
